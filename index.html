<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Is Euro Enough?</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#10b981" />
    <style>
      :root {
        --primary: #10b981;
        --primary-dark: #059669;
        --bg: #f3f4f6;
        --card: #ffffff;
        --text: #1f2937;
        --text-muted: #6b7280;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }
      body {
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 16px;
      }
      .app-container {
        background: var(--card);
        width: 100%;
        max-width: 400px;
        padding: 24px;
        border-radius: 16px;
        box-shadow:
          0 4px 6px -1px rgba(0, 0, 0, 0.1),
          0 2px 4px -1px rgba(0, 0, 0, 0.06);
      }
      h1 {
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        margin-bottom: 24px;
        color: var(--text);
      }
      button {
        width: 100%;
        padding: 16px;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
      }
      button:active {
        background-color: var(--primary-dark);
      }
      .rates-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #e5e7eb;
      }
      .rate-item {
        background: #f9fafb;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
      }
      .rate-item span {
        display: block;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }
      .rate-item b {
        font-size: 15px;
      }
      .date-text {
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 12px;
      }
      .result-box {
        margin-top: 24px;
        padding: 16px;
        background: #ecfdf5;
        border-left: 4px solid var(--primary);
        border-radius: 8px;
      }
      .result-title {
        font-size: 13px;
        color: var(--primary-dark);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .result-value {
        font-size: 26px;
        font-weight: 800;
        color: #065f46;
        margin: 6px 0;
      }
      .result-box small {
        display: block;
        color: #047857;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <h1>Лимит вывоза евро</h1>

      <form id="formGet$">
        <button id="get$Button" type="submit">Рассчитать лимит EUR</button>
      </form>

      <div id="resultBox" class="result-box">
        <div class="result-title">Безопасно взять с собой:</div>
        <div id="res" class="result-value">0 EUR</div>
        <small id="absoluteMaxInfo"></small>
      </div>

      <div class="rates-grid">
        <div class="rate-item">
          <span>Курс ЦБ EUR</span>
          <b id="eur">—</b>
        </div>
        <div class="rate-item">
          <span>Курс ЦБ USD</span>
          <b id="usd">—</b>
        </div>
      </div>
      <div id="time" class="date-text"></div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("./sw.js")
          .then(() => console.log("PWA OK"));
      }
    </script>
  </body>
</html>
